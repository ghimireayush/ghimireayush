name: Update GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *"  # Runs every 6 hours
  workflow_dispatch:        # Allows manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT }}

      - name: Purge stats cache
        run: |
          curl -X POST "https://github-readme-streak-stats.herokuapp.com/purge" -d "user=ghimireayush" || true
          curl -X POST "https://github-readme-stats.vercel.app/purge" -d "username=ghimireayush" || true
          sleep 30

      - name: Force cache invalidation
        run: |
          # Add timestamp to break cache
          sed -i "s/<!-- Last updated:.*-->/<!-- Last updated: $(date -u +%Y-%m-%dT%H:%M:%SZ) -->/" README.md
          git add README.md
          git diff --cached --quiet || git commit -m "chore: force cache break [skip ci]"
          git push
